name: CI Pipeline
on:
  push: { branches: ["main"] }
  pull_request: { branches: ["main"] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Download Dependencies
        run: go mod download
      - name: Static Analysis
        run: go vet ./...
      - name: Build Binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o aero-core ./cmd/server
      - name: Verify Binary
        run: file aero-core | grep -q "statically linked"
