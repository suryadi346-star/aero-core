<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroCore AI - Lightweight Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-secondary: #7f8c8d;
            --border: #e1e8ed;
            --success: #27ae60;
            --error: #e74c3c;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Chat Area */
        .container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: center;
            background: #ffeaea;
            color: var(--error);
            border: 1px solid var(--error);
        }

        .message.system {
            align-self: center;
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-style: italic;
        }

        /* Input Area */
        .input-container {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Settings Panel */
        .settings {
            background: var(--surface);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .setting-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .setting-group input,
        .setting-group select {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.875rem;
        }

        /* Metrics Panel */
        .metrics {
            background: var(--surface);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--border);
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .metrics h3 {
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px solid var(--border);
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        /* Welcome Screen */
        .welcome {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .welcome h2 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .welcome p {
            margin-bottom: 1.5rem;
        }

        .quick-prompts {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-prompt {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .quick-prompt:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .messages {
                padding: 1rem;
            }

            .message {
                max-width: 90%;
            }

            .header {
                padding: 1rem;
            }

            .settings {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* Loading Animation */
        .typing {
            display: flex;
            gap: 0.25rem;
            padding: 1rem 1.25rem;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-10px); opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10L90 30V70L50 90L10 70V30L50 10Z" stroke="currentColor" stroke-width="3" fill="none"/>
                <circle cx="50" cy="30" r="5" fill="currentColor"/>
                <circle cx="50" cy="70" r="5" fill="currentColor"/>
                <circle cx="30" cy="50" r="5" fill="currentColor"/>
                <circle cx="70" cy="50" r="5" fill="currentColor"/>
            </svg>
            AeroCore AI
        </div>
        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <div class="container">
        <div class="settings">
            <div class="setting-group">
                <label for="sessionId">Session ID</label>
                <input type="text" id="sessionId" value="session_001" placeholder="Enter session ID">
            </div>
            <div class="setting-group">
                <label for="model">Model</label>
                <select id="model">
                    <option value="qwen2.5:1.5b-instruct-q4_k_m">Qwen 1.5B (Q4)</option>
                    <option value="qwen2.5:3b-instruct-q4_k_m">Qwen 3B (Q4)</option>
                    <option value="qwen2.5:7b-instruct-q4_k_m">Qwen 7B (Q4)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>&nbsp;</label>
                <button onclick="clearChat()" style="padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--surface); border-radius: 4px; cursor: pointer;">
                    Clear Chat
                </button>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="welcome" id="welcomeScreen">
                    <h2>Welcome to AeroCore AI</h2>
                    <p>Lightweight, efficient AI chat running on 3-4GB RAM</p>
                    <div class="quick-prompts">
                        <div class="quick-prompt" onclick="setPrompt('Apa itu AI yang efisien?')">Apa itu AI efisien?</div>
                        <div class="quick-prompt" onclick="setPrompt('Jelaskan cara kerja model Qwen')">Cara kerja Qwen</div>
                        <div class="quick-prompt" onclick="setPrompt('Buat kode Go sederhana')">Kode Go sederhana</div>
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="Type your message..." 
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                        Send
                    </button>
                </div>
            </div>
        </div>

        <div class="metrics">
            <h3>System Metrics</h3>
            <div class="metric-item">
                <span>Status:</span>
                <span id="metricStatus">Checking...</span>
            </div>
            <div class="metric-item">
                <span>Messages:</span>
                <span id="metricMessages">0</span>
            </div>
            <div class="metric-item">
                <span>Session:</span>
                <span id="metricSession">-</span>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = window.location.origin;
        const WS_URL = `ws://${window.location.host}/chat/stream`;
        
        // State
        let currentEventSource = null;
        let messageCount = 0;
        let isStreaming = false;

        // DOM Elements
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const sessionIdInput = document.getElementById('sessionId');
        const modelSelect = document.getElementById('model');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const metricMessages = document.getElementById('metricMessages');
        const metricSession = document.getElementById('metricSession');
        const metricStatus = document.getElementById('metricStatus');

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Handle Enter key
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Set prompt from quick prompts
        function setPrompt(text) {
            messageInput.value = text;
            messageInput.focus();
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }
        }

        // Clear chat
        function clearChat() {
            messagesDiv.innerHTML = '';
            messageCount = 0;
            updateMetrics();
            if (welcomeScreen) {
                welcomeScreen.style.display = 'block';
            }
        }

        // Update metrics display
        function updateMetrics() {
            metricMessages.textContent = messageCount;
            metricSession.textContent = sessionIdInput.value;
        }

        // Check health
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusIndicator.classList.add('connected');
                    statusText.textContent = 'Connected';
                    metricStatus.textContent = 'Online';
                    metricStatus.style.color = 'var(--success)';
                } else {
                    throw new Error('Health check failed');
                }
            } catch (error) {
                statusIndicator.classList.remove('connected');
                statusText.textContent = 'Disconnected';
                metricStatus.textContent = 'Offline';
                metricStatus.style.color = 'var(--error)';
            }
        }

        // Add message to chat
        function addMessage(role, content, isError = false) {
            if (welcomeScreen && role !== 'system') {
                welcomeScreen.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;
            
            if (role === 'assistant' && !isError) {
                // Create typing indicator first
                messageDiv.className = 'message assistant typing';
                messageDiv.innerHTML = '<span></span><span></span><span></span>';
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                // Replace with actual content when streaming
                setTimeout(() => {
                    messageDiv.className = 'message assistant';
                    messageDiv.textContent = content;
                }, 100);
            } else {
                messageDiv.textContent = content;
                messagesDiv.appendChild(messageDiv);
            }
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            messageCount++;
            updateMetrics();
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            const sessionId = sessionIdInput.value.trim() || 'session_' + Date.now();
            const model = modelSelect.value;

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Add user message
            addMessage('user', message);

            // Show typing indicator
            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message,
                        model: model
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                // Handle SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('event: chunk')) {
                            // Next line contains data
                            const dataLine = lines[lines.indexOf(line) + 1];
                            if (dataLine && dataLine.startsWith('data:')) {
                                try {
                                    const data = JSON.parse(dataLine.substring(5).trim());
                                    if (data.content) {
                                        assistantMessage += data.content;
                                        
                                        if (firstChunk) {
                                            addMessage('assistant', '');
                                            firstChunk = false;
                                        }
                                        
                                        // Update last message
                                        const lastMessage = messagesDiv.lastElementChild;
                                        if (lastMessage && lastMessage.classList.contains('assistant')) {
                                            lastMessage.textContent = assistantMessage;
                                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                        }
                                    }
                                } catch (e) {
                                    console.error('Parse error:', e);
                                }
                            }
                        } else if (line.startsWith('event: error')) {
                            const dataLine = lines[lines.indexOf(line) + 1];
                            if (dataLine) {
                                const error = JSON.parse(dataLine.substring(1).trim());
                                addMessage('system', `Error: ${error.error || error.reason || 'Unknown error'}`, true);
                            }
                        } else if (line.startsWith('event: done')) {
                            // Stream completed
                            break;
                        }
                    }
                }

            } catch (error) {
                console.error('Stream error:', error);
                addMessage('system', `Connection error: ${error.message}`, true);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Periodic health check
        setInterval(checkHealth, 30000); // Every 30 seconds

        // Initial health check
        checkHealth();

        // Focus input on load
        messageInput.focus();

        // Update session ID in metrics when changed
        sessionIdInput.addEventListener('change', updateMetrics);
    </script>
</body>
</html>
